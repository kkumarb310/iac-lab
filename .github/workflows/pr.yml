name: Terraform PR

on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "ap-southeast-1"
  ROLE_ARN: "arn:aws:iam::459185600897:role/iac-lab-github-actions"

jobs:
  terraform-pr:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive --force

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

      - name: Terraform plan
        id: plan
        env:
          TF_VAR_db_username: ${{ secrets.TF_VAR_db_username }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
        run: |
          terraform plan -var-file="dev.tfvars" -no-color -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Claude API plan summary
        id: claude_summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - << 'EOF'
          import json, urllib.request, os, sys
          api_key = os.environ.get("ANTHROPIC_API_KEY", "")
          if not api_key:
              with open("summary.txt", "w") as f:
                  f.write("Summary unavailable - API key not configured")
              sys.exit(0)
          try:
              with open("plan.txt") as f:
                  plan = f.read()[-2000:]
          except:
              plan = "No plan output available"
          payload = json.dumps({
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 500,
              "messages": [{"role": "user", "content": f"Summarise this terraform plan in 3 bullet points: what changes, risk level, cost impact.\n\n{plan}"}]
          }).encode()
          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )
          try:
              with urllib.request.urlopen(req) as r:
                  result = json.loads(r.read())
                  summary = result["content"][0]["text"]
          except Exception as e:
              summary = f"Summary unavailable: {e}"
          with open("summary.txt", "w") as f:
              f.write(summary)
          print(summary)
          EOF

      - name: Post plan and summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.existsSync('plan.txt') ? fs.readFileSync('plan.txt', 'utf8').slice(-3000) : 'Plan output unavailable';
            const summary = fs.existsSync('summary.txt') ? fs.readFileSync('summary.txt', 'utf8') : 'Summary unavailable';
            const output = `## Claude AI Plan Summary\n${summary}\n\n---\n#### Terraform Format: \`${{ steps.fmt.outcome }}\`\n#### Terraform Validate: \`${{ steps.validate.outcome }}\`\n#### Terraform Plan: \`${{ steps.plan.outcome }}\`\n\n<details><summary>Show Full Plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>\n\n*Actor: @${{ github.actor }} | Event: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
